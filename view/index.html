<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random User Page Generator Project</title>
    <link rel="stylesheet" href="../public/style.css" />
    <script type="module" src="../app.js" defer></script>
  </head>
  <body>
    <button type="button" id="generate-user">Generate User</button>
    <div id="main-user">
      <img id="main-user-picture" src="" alt="User Picture" />

      <h2 id="main-user-fullname">Loading Name...</h2>

      <h3 id="main-user-location"></h3>
    </div>

    <h3>Favourite Quote:</h3>
    <div id="quote"></div>

    <div id="pokemon">
      <h4>Pokemon</h4>
      <div id="pokemon-name">Loading Pokemon Name</div>
      <img id="pokemon-image" src="" alt="pokemon-name" />
    </div>

    <h3>About Me</h3>
    <div id="about-me"></div>

    <div id="friends-panel">
      <h3>My Friends</h3>
      <ul id="friends-container"></ul>
    </div>
  </body>
</html>
